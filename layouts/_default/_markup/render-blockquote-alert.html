{{- $emojiMap := dict
  "note" "ℹ️"
  "tip" "💡"
  "important" "💬"
  "warning" "⚠️"
  "caution" "🛑"
-}}
{{- $type := .AlertType -}}
{{- $title := or .AlertTitle (title $type) -}}
{{- $emoji := index $emojiMap $type -}}
<div class="alert alert-{{ $type }}">
  <p class="alert-heading">
    {{- $emoji -}}
    <span>{{ $title }}</span>
  </p>
  {{ .Text }}
</div>
